<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090f"/>
      <stop offset="100%" style="stop-color:#0f1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#38bdf8" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="4" height="470" fill="url(#accent)" opacity="0.6" rx="2"/>

  <!-- Orange top accent -->
  <rect x="80" y="80" width="200" height="4" fill="#e8753d" rx="2"/>

  <!-- Logo area -->
  <rect x="96" y="110" width="52" height="52" rx="10" fill="#13181f" stroke="#1e2738" stroke-width="1"/>
  <text x="122" y="143" font-family="monospace" font-size="22" font-weight="900" fill="#38bdf8" text-anchor="middle">&gt;_</text>

  <!-- Brand name -->
  <text x="164" y="147" font-family="system-ui, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="-1" fill="white">SITE</text>
  <text x="233" y="147" font-family="system-ui, Arial, sans-serif" font-size="28" font-weight="900" letter-spacing="-1" fill="#e8753d"> FORGE</text>

