  <rect x="720" y="185" width="400" height="15" fill="#0f1117" opacity="0.9"/>
  <circle cx="745" cy="180" r="6" fill="#f87171"/>
  <circle cx="765" cy="180" r="6" fill="#fbbf24"/>
  <circle cx="785" cy="180" r="6" fill="#4ade80"/>
