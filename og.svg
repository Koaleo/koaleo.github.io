  <text x="96" y="358" font-family="system-ui, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-2" fill="#38bdf8">Costruito per restare.</text>

  <!-- Subtitle -->
  <text x="96" y="430" font-family="system-ui, Arial, sans-serif" font-size="26" fill="#64748b">Siti vetrina · E-commerce · Siti 3D · Fotografia</text>

  <!-- Bottom info -->
  <text x="96" y="530" font-family="monospace" font-size="18" fill="#38bdf8" opacity="0.7">matteo@tntc.it</text>
  <text x="96" y="558" font-family="monospace" font-size="18" fill="#64748b" opacity="0.6">forgesite.it</text>

