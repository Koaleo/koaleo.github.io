  <text x="820" y="344" font-family="monospace" font-size="14" fill="#86efac">fast</text>
  <text x="853" y="344" font-family="monospace" font-size="14" fill="#94a3b8">={</text>
  <text x="870" y="344" font-family="monospace" font-size="14" fill="#38bdf8">true</text>
  <text x="904" y="344" font-family="monospace" font-size="14" fill="#94a3b8">} /&gt;</text>
